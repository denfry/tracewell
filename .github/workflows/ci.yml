name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [debug, release]
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v4

      - name: Set up vcpkg environment
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset ${{ matrix.config }}

      - name: Test
        run: ctest --preset ${{ matrix.config }}

      - name: Upload CLI artifact
        if: matrix.config == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: tracewell-cli-${{ github.sha }}
          path: build/src/Release/tracewell-cli.exe
